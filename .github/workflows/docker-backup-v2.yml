name: 自动搬运Docker镜像

on:
  workflow_dispatch:
    inputs:
      image:
        description: '请输入完整的镜像名'
        required: true
        default: 'quay.io/ascend/vllm-ascend:v0.18.0-a3'
      platform:
        description: '请输入目标平台'
        required: true
        default: 'linux/arm64'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 准备多架构支持
        uses: docker/setup-qemu-action@v4

      - name: 拉取、打包、分卷
        run: |
          IMAGE=${{ github.event.inputs.image }}
          FILE=$(echo $IMAGE | tr '/:' '_')
          docker pull --platform ${{ github.event.inputs.platform }} $IMAGE
          docker save $IMAGE | gzip > ${FILE}.tar.gz
          split -b 1900M -d ${FILE}.tar.gz ${FILE}.tar.gz.part.

      - name: 发布到Releases供下载
        uses: softprops/action-gh-release@v3
        with:
          tag_name: backup-${{ github.run_number }}
          name: Docker Image: ${{ github.event.inputs.image }}
          body: >
            ### Docker Image Backup


            ### 镜像信息
            - **Name**: ${{ github.event.inputs.image }}
            - **Platform**: ${{ github.event.inputs.platform }}
            - **文件详情**：请查看下方 Assets 部分，获取压缩包大小及分卷数量。


            ### ⚠️ 文件分卷说明
            为符合 GitHub 单文件 2GB 限制，大文件会自动分卷。请下载 Assets 中所有以 `.part.` 开头的文件。


            ### 📥 下载命令
            **下载所有分卷**：
            ```bash
            for i in $(seq -f "%03g" 0 2); do
              wget https://github.com/${{ github.repository }}/releases/download/backup-${{ github.run_number }}/${{ github.event.inputs.image }}.tar.gz.part.$i
            done
合并文件：

bash
cat ${{ github.event.inputs.image }}.tar.gz.part.* > ${{ github.event.inputs.image }}.tar.gz
加载镜像：

bash
docker load -i ${{ github.event.inputs.image }}.tar.gz
files: |
.tar.gz.part.
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

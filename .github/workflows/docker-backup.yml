name: 自动搬运Docker镜像

on:
  workflow_dispatch:
    inputs:
      image:
        description: '请输入完整的镜像名'
        required: true
        default: 'quay.io/ascend/vllm-ascend:v0.18.0-a3'
      platform:
        description: '请输入目标平台'
        required: true
        default: 'linux/arm64'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 准备多架构支持
        uses: docker/setup-qemu-action@v4

      - name: 拉取、打包、分卷
        id: package
        run: |
          IMAGE=${{ github.event.inputs.image }}
          FILE=$(echo $IMAGE | tr '/:' '_')
          REPO=$(echo $IMAGE | cut -d':' -f1)
          TAG=$(echo $IMAGE | cut -d':' -f2)
          
          # 导出变量供后续步骤使用
          echo "file_name=${FILE}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          
          # 拉取并打包
          docker pull --platform ${{ github.event.inputs.platform }} $IMAGE
          docker save $IMAGE | gzip > ${FILE}.tar.gz
          
          # 分卷并计数
          split -b 1900M -d -a 3 ${FILE}.tar.gz ${FILE}.tar.gz.part.
          PART_COUNT=$(ls -1 ${FILE}.tar.gz.part.* | wc -l)
          echo "part_count=${PART_COUNT}" >> $GITHUB_OUTPUT
          
          # 计算大小（MB）
          SIZE_MB=$(du -m ${FILE}.tar.gz | cut -f1)
          echo "size_mb=${SIZE_MB}" >> $GITHUB_OUTPUT

      - name: 发布到Releases供下载
        uses: softprops/action-gh-release@v3
        with:
          tag_name: backup-${{ github.run_number }}
          name: "Docker Image: ${{ github.event.inputs.image }}"
          body: |
            ### Docker Image Backup
            
            ### 镜像信息
            
            - **Name**: `${{ steps.package.outputs.repo }}`
            - **Tag**: `${{ steps.package.outputs.tag }}`
            - **Platform**: `${{ github.event.inputs.platform }}`
            - **Compressed Size**: ${{ steps.package.outputs.size_mb }}M (${{ steps.package.outputs.size_mb }}MB)
            
            ### ⚠️ 文件分卷说明
            
            由于文件大小 (${{ steps.package.outputs.size_mb }}M) 超过 GitHub 的 2GB 限制，已分割成 ${{ steps.package.outputs.part_count }} 个分卷文件。
            
            ### 📥 下载命令
            
            ```
            # 下载所有分卷
            for i in $(seq -f "%03g" 0 $((${{ steps.package.outputs.part_count }}-1))); do \
              wget https://github.com/${{ github.repository }}/releases/download/backup-${{ github.run_number }}/${{ steps.package.outputs.file_name }}.tar.gz.part.$i; \
            done
            
            # 合并文件
            cat ${{ steps.package.outputs.file_name }}.tar.gz.part.* > ${{ steps.package.outputs.file_name }}.tar.gz
            
            # 加载镜像
            docker load -i ${{ steps.package.outputs.file_name }}.tar.gz
            ```
          files: |
            *.tar.gz.part.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

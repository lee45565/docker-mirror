name: 自动搬运Docker镜像

on:
  workflow_dispatch:
    inputs:
      image:
        description: '请输入完整的镜像名'
        required: true
        default: 'quay.io/ascend/vllm-ascend:v0.18.0-a3'
      platform:
        description: '请输入目标平台'
        required: true
        default: 'linux/arm64'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 准备多架构支持
        uses: docker/setup-qemu-action@v4

      - name: 拉取、打包、分卷
        run: |
          IMAGE=${{ github.event.inputs.image }}
          FILE=$(echo $IMAGE | tr '/:' '_')
          docker pull --platform ${{ github.event.inputs.platform }} $IMAGE
          docker save $IMAGE | gzip > ${FILE}.tar.gz
          split -b 1900M -d ${FILE}.tar.gz ${FILE}.tar.gz.part.

      - name: 发布到Releases供下载
        uses: softprops/action-gh-release@v3
        with:
          tag_name: backup-${{ github.run_number }}
          name: Docker Image: ${{ github.event.inputs.image }}
          body: |
            ### 镜像信息
            - 镜像名: ${{ github.event.inputs.image }}
            - 平台: ${{ github.event.inputs.platform }}

            ### 下载与使用方法
            1. 下载所有 .part.000 ~ .part.002 分卷文件
            2. 在 Windows 上合并分卷：
               copy /b *.part.* 完整文件名.tar.gz
            3. 将合并后的文件传到 ARM 服务器
            4. 在服务器上加载镜像：
               docker load -i 完整文件名.tar.gz
            5. 验证架构：
               docker inspect 镜像名 | grep Architecture
          files: |
            *.tar.gz.part.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
